<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Balai Alegria Admin</title>
    <link rel="icon" type="image/png" href="images/logo1.png">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin_style.css">
</head>
<body>
    <div class="dashboard-container">
         <aside class="sidebar">
            <div class="sidebar-header">
                <img src="images/logo1.png" alt="Logo">
            </div>
            <nav class="sidebar-nav">
                <a href="admin_dashboard.html" class="nav-item">
                    <span class="icon">&#128202;</span>
                    <span>Dashboard</span>
                </a>
                <a href="admin_bookings.html" class="nav-item">
                    <span class="icon">&#128197;</span>
                    <span>Bookings</span>
                </a>
                <a href="admin_staff.html" class="nav-item">
                    <span class="icon">&#128101;</span>
                    <span>Staff Management</span>
                </a>
                 <a href="admin_reports.html" class="nav-item">
                    <span class="icon">&#128203;</span>
                    <span>Reports</span>
                </a>
                <a href="admin_settings.html" class="nav-item active">
                    <span class="icon">&#9965;</span>
                    <span>Settings</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                 <div class="header-title">
                    <h1>Settings & Configuration</h1>
                    <p>Manage pricing, policies, and payment integrations.</p>
                </div>
                <div class="user-info">
                    <span>Welcome, Admin</span>
                    <a href="admin_login.html" class="logout-btn">Logout</a>
                </div>
            </header>

            <section class="content-section">
                <div class="card">
                    <div class="tabs">
                        <button class="tab-link active" data-tab="pricing">Room Pricing</button>
                        <button class="tab-link" data-tab="policies">Policies</button>
                        <button class="tab-link" data-tab="payments">Payments</button>
                    </div>

                    <div id="pricing" class="tab-content active">
                        <form class="settings-form">
                            <div class="form-group">
                                <label for="price-vs">Family Kubo (per night)</label>
                                <input type="text" id="price-vs" value="17500">
                            </div>
                            <div class="form-group">
                                <label for="price-ca">Mini Kubo (per night)</label>
                                <input type="text" id="price-ca" value="6000">
                            </div>
                            <button type="submit" class="btn">Save Prices</button>
                        </form>
                    </div>

                    <div id="policies" class="tab-content">
                        <form class="settings-form">
                            <div class="form-group">
                                <label for="policy-booking">Booking Policy</label>
                                <textarea id="policy-booking" rows="5">A 50% down payment is required to confirm a booking.</textarea>
                            </div>
                            <div class="form-group">
                                <label for="policy-cancel">Cancellation Policy</label>
                                <textarea id="policy-cancel" rows="5">Cancellations made 14 days before the check-in date are eligible for a full refund. No refunds for cancellations made within 14 days of check-in.</textarea>
                            </div>
                            <button type="submit" class="btn">Save Policies</button>
                        </form>
                    </div>

                    <div id="payments" class="tab-content">
                         <form class="settings-form">
                            <p>Manage your PayMongo API key integration.</p>
                            <div class="form-group">
                                <label for="paymongo-key">PayMongo Secret Key</label>
                                <input type="password" id="paymongo-key" value="sk_test_xxxxxxxxxxxx">
                            </div>
                            <button type="submit" class="btn">Save API Key</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="admin_script.js"></script>
</body>
</html>
